<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Pixel Racer</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <div id="main-layout">
        <div id="game-container">
            <div class="label start">START</div>
            <div class="label finish">FINISH</div>
            
            <canvas id="mazeCanvas"></canvas>
            <img id="car" src="SLIKE/up.png" alt="Avto">
        </div>

        <div id="sidebar">
            <div class="title-box">
                <h2>PIXEL RACER</h2>
            </div>

            <div class="timer">
                <span class="timer-label">ČAS</span>
                <div class="timer-value"><span id="time-val">0.0</span>s</div>
            </div>

            <div class="legend">
                <h3>KONTROLE</h3>
                <div class="control-keys">
                    <span>W</span><span>A</span><span>S</span><span>D</span>
                </div>
                <p>ali <b>PUŠČICE</b></p>
            </div>

            <button id="show-solution-btn" class="action-btn">POKAŽI REŠITEV</button>
        </div>
    </div>

    <script src="JS/script.js"></script>
</body>
</html>
